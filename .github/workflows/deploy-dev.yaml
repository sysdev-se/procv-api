name: Build and deploy to Cloud Run

on:
  push:
    branches: [ develop ]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: asia-southeast1
      CLOUD_RUN_SERVICE: procv-server-dev
      ARTIFACT_REPO: procv

    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

      - name: Build native image with Spring Boot buildpacks
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          ./mvnw -Pnative spring-boot:build-image \
            -Dspring-boot.build-image.imageName="$IMAGE"

      - name: Push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/procv-api:${{ github.sha }}"
          region: ${{ env.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: asia-southeast1
      CLOUD_RUN_SERVICE: procv-server-test
      ARTIFACT_REPO: procv
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev
      - run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          ./mvnw -Pnative spring-boot:build-image \
            -Dspring-boot.build-image.imageName="$IMAGE"
      - run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          docker push "$IMAGE"
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/procv-api:${{ github.sha }}"
          region: ${{ env.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: asia-southeast1
      CLOUD_RUN_SERVICE: procv-server-prod
      ARTIFACT_REPO: procv
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev
      - run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          ./mvnw -Pnative spring-boot:build-image \
            -Dspring-boot.build-image.imageName="$IMAGE"
      - run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          docker push "$IMAGE"
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/procv-api:${{ github.sha }}"
          region: ${{ env.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
