name: Build and deploy to Cloud Run

on:
  push:
    branches: [ develop ]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: europe-west1
      CLOUD_RUN_SERVICE: procv-server-dev
      ARTIFACT_REPO: artifact-registry-dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: procv-dev-000001
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

      - name: Build native image with Spring Boot buildpacks
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/procv-dev-000001/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName="$IMAGE"

      - name: Push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/procv-dev-000001/${ARTIFACT_REPO}/procv-api:${GITHUB_SHA}"
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: "${{ env.GCP_REGION }}-docker.pkg.dev/procv-dev-000001/${{ env.ARTIFACT_REPO }}/procv-api:${{ github.sha }}"
          region: ${{ env.GCP_REGION }}
          project_id: procv-dev-000001